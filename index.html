<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎹 ピアノ練習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#12121e;color:#eee;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
}
/* ─── Header ─── */
.header{
  background:#1a1a30;flex-shrink:0;
  border-bottom:1px solid #2a2a50;
}
.header-row1{
  padding:10px 14px;display:flex;align-items:center;gap:10px;
}
.header h1{font-size:16px;white-space:nowrap;}
.song-select{
  flex:1;background:#0e0e22;color:#eee;
  border:1px solid #3a3a6a;border-radius:8px;
  padding:7px 10px;font-size:14px;-webkit-appearance:none;min-width:0;
}
.reset-btn{
  background:#e94560;color:#fff;border:none;
  border-radius:8px;padding:7px 13px;font-size:14px;cursor:pointer;
  flex-shrink:0;font-weight:700;
}
/* BPM row */
.header-row2{
  padding:6px 14px 10px;
  display:flex;align-items:center;gap:10px;
}
.bpm-label{font-size:11px;color:#888;white-space:nowrap;flex-shrink:0;}
.bpm-slider{
  flex:1;height:4px;accent-color:#4ecdc4;cursor:pointer;
  -webkit-appearance:none;background:#2a2a50;border-radius:2px;
}
.bpm-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:#4ecdc4;cursor:pointer;
}
.bpm-val{
  font-size:14px;font-weight:700;color:#4ecdc4;
  font-family:monospace;width:28px;text-align:right;flex-shrink:0;
}
.play-btn{
  background:#4ecdc4;color:#000;border:none;
  border-radius:8px;padding:6px 14px;font-size:15px;
  cursor:pointer;font-weight:700;flex-shrink:0;
  min-width:44px;
}
/* ─── Status ─── */
.status{
  background:#1a1a30;padding:8px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;border-bottom:1px solid #2a2a50;gap:8px;
}
.next-label{font-size:11px;color:#888;margin-bottom:2px;}
.next-note{font-size:26px;font-weight:700;color:#4ecdc4;font-family:monospace;letter-spacing:1px;}
/* Combo */
.combo-wrap{flex:1;display:flex;justify-content:center;}
.combo-badge{
  font-size:13px;font-weight:800;color:#ff6b35;
  padding:4px 10px;border-radius:20px;
  border:2px solid transparent;
  min-height:26px;display:flex;align-items:center;
}
.combo-badge.show{
  border-color:#ff6b35;background:rgba(255,107,53,.12);
}
@keyframes combo-pop{
  0%  {transform:scale(.4);opacity:0;}
  55% {transform:scale(1.25);opacity:1;}
  100%{transform:scale(1);opacity:1;}
}
.combo-badge.anim{animation:combo-pop .35s cubic-bezier(.22,1,.36,1) both;}
/* ─── Progress ─── */
.progress{height:4px;background:#2a2a50;flex-shrink:0;}
.progress-fill{height:100%;background:linear-gradient(90deg,#4ecdc4,#e94560);transition:width .3s;}
/* ─── Sheet Music ─── */
.score-section{flex:1;background:#fff;overflow:hidden;min-height:0;}
.score-scroll{width:100%;height:100%;overflow-x:auto;overflow-y:auto;}
#score-container{display:inline-block;min-width:100%;padding:4px 0;}
/* ─── Keyboard ─── */
.keyboard-wrap{
  flex-shrink:0;background:#0a0a18;
  padding:10px 8px 16px;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  height:210px;
}
.keyboard{
  display:inline-flex;position:relative;
  touch-action:pan-x;user-select:none;-webkit-user-select:none;
}
.white-key{
  width:44px;height:180px;
  background:#fafafa;border:1px solid #bbb;
  border-bottom-left-radius:6px;border-bottom-right-radius:6px;
  cursor:pointer;touch-action:none;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:8px;font-size:10px;color:#bbb;font-family:monospace;
  position:relative;z-index:1;transition:background .07s;flex-shrink:0;
}
.white-key.hl{background:#b2f5e8!important;box-shadow:inset 0 -6px 0 #4ecdc4;}
.white-key.ok{background:#6eea90!important;}
.white-key.ng{background:#f08888!important;}
.black-key{
  width:30px;height:112px;
  background:#1c1c1c;border:1px solid #000;border-top:none;
  border-radius:0 0 5px 5px;
  position:absolute;top:0;z-index:2;
  cursor:pointer;touch-action:none;transition:background .07s;
  -webkit-tap-highlight-color:transparent;
}
.black-key.hl{background:#1a7a62!important;border-color:#4ecdc4;}
.black-key.ok{background:#1e8c40!important;}
.black-key.ng{background:#8c1e1e!important;}
/* ─── Completion ─── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;place-items:center;z-index:999;
}
.overlay.show{display:grid;}
.card{background:#1a1a30;border-radius:20px;padding:40px 32px;text-align:center;}
.card .emoji{font-size:64px;margin-bottom:12px;}
.card h2{font-size:24px;margin-bottom:6px;}
.card p{color:#888;font-size:13px;margin-bottom:24px;}
.card button{
  background:#4ecdc4;color:#000;border:none;
  border-radius:12px;padding:12px 32px;
  font-size:16px;font-weight:700;cursor:pointer;
}
/* ─── Score display ─── */
.score-display{font-size:13px;color:#888;text-align:right;flex-shrink:0;}
</style>
</head>

  </div>

    <span class="bpm-val" id="bpmVal">80</span>
    <button class="play-btn" id="playBtn">▶</button>
  </div>
</div>

<div class="status">
  <div>

<div class="progress"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
const DUR_BEATS = {w:4,h:2,q:1,'8':0.5,hd:3,qd:1.5};

function vexToId(k) {
  const [pitch, oct] = k.split('/');
  return pitch.replace('n','').toUpperCase() + oct;
}

const SOLFEGE_MAP = {
  'C':'ド','D':'レ','E':'ミ','F':'ファ','G':'ソ','A':'ラ','B':'シ',
  'C#':'ド♯','D#':'レ♯','F#':'ファ♯','G#':'ソ♯','A#':'ラ♯',
};

function toSolfege(noteId) {
  const m = noteId.match(/^([A-G][#b]?)/i);
  return m ? (SOLFEGE_MAP[m[1].toUpperCase()] || noteId) : noteId;
}

function splitMeasures(song) {
  const bpm = song.timeNum;
  const measures = [], cur = [];
  let beats = 0;
  for (const n of song.notes) {
    cur.push(n);
    beats += DUR_BEATS[n.d] || 1;
    if (beats >= bpm - 0.01) { measures.push([...cur]); cur.length = 0; beats = 0; }
  }
  if (cur.length) measures.push([...cur]);
  return measures;
}

// ════════════════════════════════════════

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playFreq(freq, dur = 1.2) {
  ensureAudio();
  const ctx = audioCtx, now = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.4, now + 0.01);
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  master.connect(ctx.destination);
  [[1,1],[2,0.4],[3,0.2],[4,0.1],[6,0.05]].forEach(([h,a]) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = freq * h; g.gain.value = a;
    o.connect(g); g.connect(master); o.start(now); o.stop(now + dur + 0.05);
  });
}

function playTick() {
  ensureAudio();
  const ctx = audioCtx, now = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.frequency.value = 1200; o.type = 'sine';
  g.gain.setValueAtTime(0.15, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  o.connect(g); g.connect(ctx.destination);
  o.start(now); o.stop(now + 0.1);
}

function playNote(noteId) { const f = FREQ[noteId]; if (f) playFreq(f); }

// ════════════════════════════════════════
// COMBO
// ════════════════════════════════════════
function updateCombo(correct) {
  if (correct) {
    combo++;
    if (combo >= 3) showCombo();
  } else {
    combo = 0;
    const badge = document.getElementById('comboBadge');
    badge.textContent = '';
    badge.classList.remove('show','anim');
  }
}

function showCombo() {
  const badge = document.getElementById('comboBadge');
  let text;
  if      (combo >= 20) text = `${combo} 💥 PERFECT!!`;
  else if (combo >= 10) text = `${combo} ⚡ AMAZING!`;
  else if (combo >= 5)  text = `${combo} 🔥 GREAT!`;
  else                  text = `${combo} 👍 GOOD!`;
  badge.textContent = text;
  badge.classList.add('show');
  badge.classList.remove('anim');
  requestAnimationFrame(() => requestAnimationFrame(() => badge.classList.add('anim')));
}

// ════════════════════════════════════════
// AUTO-PLAY (テンポ設定)
// ════════════════════════════════════════
// セッションIDで古いタイマーを無効化する方式
let autoPlayId = 0;

function stopAutoPlay() {
  isAutoPlaying = false;
  autoPlayId++;   // 全ての pending コールバックを無効化
  document.getElementById('playBtn').textContent = '▶';
}

function playNextAutoNote(sid) {
  // セッションが変わっていたら何もしない
  if (sid !== autoPlayId || !isAutoPlaying) return;

  const song = SONGS[songIdx];
  if (currentNote >= song.notes.length) {
    stopAutoPlay();
    setTimeout(showComplete, 300);
    return;
  }

  const note = song.notes[currentNote];
  const beatMs = 60000 / bpm;
  const noteMs = (DUR_BEATS[note.d] || 1) * beatMs;
  const noteId = vexToId(note.k);

  playNote(noteId);
  flashKey(noteId, 'ok', Math.min(noteMs - 60, 500));
  currentNote++;
  updateStatus();
  try { renderScore(); } catch(e) { console.warn('renderScore:', e); }
  highlightCurrentKey();
  updateCombo(true);

  // 次の音をスケジュール（キャプチャしたsidで識別）
  setTimeout(() => playNextAutoNote(sid), noteMs);
}

function toggleAutoPlay() {
  ensureAudio();
  if (isAutoPlaying) { stopAutoPlay(); return; }

  // 曲が終わっていたら先頭から
  if (currentNote >= SONGS[songIdx].notes.length) {
    currentNote = 0; combo = 0;
    document.getElementById('comboBadge').textContent = '';
    document.getElementById('comboBadge').classList.remove('show','anim');
    updateStatus(); renderScore(); highlightCurrentKey();
  }

  isAutoPlaying = true;
  autoPlayId++;
  const sid = autoPlayId;
  document.getElementById('playBtn').textContent = '⏸';

  // カウントイン: tick tick → 演奏開始
  const beatMs = 60000 / bpm;
  playTick();
  setTimeout(() => {
    if (sid !== autoPlayId) return;
    playTick();
    setTimeout(() => playNextAutoNote(sid), beatMs);
  }, beatMs);
}

// ════════════════════════════════════════
// SCORE RENDERING
// ════════════════════════════════════════
function renderScore() {
  const container = document.getElementById('score-container');
  container.innerHTML = '';
  const song = SONGS[songIdx];
  const measures = splitMeasures(song);
  const VF = Vex.Flow;

  const scrollW = document.getElementById('scoreScroll').clientWidth || 360;
  const FIRST_W = Math.min(220, scrollW - 20);
  const MEAS_W  = Math.max(140, Math.min(180, (scrollW - 20) / 3));
  const ROW_H   = 110, MARGIN = 10;

  let perRow = 1;
  { let used = FIRST_W; while (used + MEAS_W <= scrollW - 20) { used += MEAS_W; perRow++; } }

  const rows = [];
  for (let i = 0; i < measures.length; i += perRow) rows.push(measures.slice(i, i + perRow));
  const totalH = rows.length * ROW_H + 20;
  const totalW = Math.max(scrollW, FIRST_W + MEAS_W * (perRow - 1) + 20);

  const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
  renderer.resize(totalW, totalH);
  const ctx = renderer.getContext();
  let globalIdx = 0;

  rows.forEach((rowM, ri) => {
    let x = MARGIN;
    const y = MARGIN + ri * ROW_H;
    rowM.forEach((mNotes, mi) => {
      const isFirst = ri === 0 && mi === 0;
      const w = isFirst ? FIRST_W : MEAS_W;
      const stave = new VF.Stave(x, y, w);
      if (isFirst) stave.addClef('treble').addTimeSignature(`${song.timeNum}/${song.timeDen}`);
      stave.setContext(ctx).draw();

      const sNotes = mNotes.map((n, ni) => {
        const gIdx = globalIdx + ni;
        const sn = new VF.StaveNote({ keys: [n.k], duration: n.d });
        if (n.acc) sn.addModifier(new VF.Accidental(n.acc), 0);
        if (gIdx === currentNote)    sn.setStyle({ fillStyle:'#e94560', strokeStyle:'#e94560' });
        else if (gIdx < currentNote) sn.setStyle({ fillStyle:'#4ecdc4', strokeStyle:'#4ecdc4' });
        else                         sn.setStyle({ fillStyle:'#333',    strokeStyle:'#333'    });
        return sn;
      });
      globalIdx += mNotes.length;

      try {
        const voice = new VF.Voice({ num_beats: song.timeNum, beat_value: song.timeDen })
          .setMode(VF.Voice.Mode.SOFT);
        voice.addTickables(sNotes);
        new VF.Formatter().joinVoices([voice]).format([voice], w - (isFirst ? 70 : 24));
        voice.draw(ctx, stave);
      } catch(e) { console.warn(e); }
      x += w;
    });
  });

  // Scroll to current note row
  const curMeasureIdx = measures.findIndex((_, i) => {
    let s = 0; for (let j = 0; j <= i; j++) s += measures[j].length; return s > currentNote;
  });
  const curRow = Math.floor(Math.max(0, curMeasureIdx) / perRow);
  document.getElementById('scoreScroll').scrollTop = Math.max(0, curRow * ROW_H - 20);
}

// ════════════════════════════════════════
// KEYBOARD
// ════════════════════════════════════════
const OCTAVES = [3, 4, 5];
const WHITE   = ['C','D','E','F','G','A','B'];
const BLACKS  = [{note:'C#',left:30},{note:'D#',left:74},{note:'F#',left:162},{note:'G#',left:206},{note:'A#',left:250}];
const WHITE_W = 44;

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const doKey = (id, el) => {
    el.dataset.note = id;
    el.addEventListener('pointerdown', e => { e.preventDefault(); handlePress(id); });
  };

  OCTAVES.forEach(oct => {
    const block = document.createElement('div');
    block.style.cssText = `position:relative;display:inline-block;width:${WHITE_W*7}px;flex-shrink:0;`;
    WHITE.forEach((n,i) => {
      const key = document.createElement('div');
      key.className = 'white-key';
      key.textContent = SOLFEGE_MAP[n] || n;
      key.style.cssText = `position:absolute;left:${i*WHITE_W}px;top:0;`;
      doKey(`${n}${oct}`, key);
      block.appendChild(key);
    });
    const sp = document.createElement('div');
    sp.style.cssText = 'height:180px;display:block;';
    block.appendChild(sp);
    BLACKS.forEach(({note,left}) => {
      const key = document.createElement('div');
      key.className = 'black-key';
      key.style.left = `${left}px`;
      doKey(`${note}${oct}`, key);
      block.appendChild(key);
    });
    kb.appendChild(block);
  });

  // C6
  const lb = document.createElement('div');
  lb.style.cssText = `position:relative;display:inline-block;width:${WHITE_W}px;flex-shrink:0;`;
  const c6 = document.createElement('div');
  c6.className = 'white-key'; c6.textContent = 'ド';
  c6.style.cssText = 'position:absolute;left:0;top:0;';
  doKey('C6', c6);
  const sp2 = document.createElement('div'); sp2.style.cssText = 'height:180px;display:block;';
  lb.appendChild(c6); lb.appendChild(sp2); kb.appendChild(lb);

  setTimeout(() => { document.querySelector('.keyboard-wrap').scrollLeft = WHITE_W * 7 - 20; }, 50);
}

function flashKey(id, cls, ms = 300) {
  const el = document.querySelector(`[data-note="${id}"]`);
  if (!el) return;
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), ms);
}

function highlightCurrentKey() {
  document.querySelectorAll('.hl').forEach(e => e.classList.remove('hl'));
  const song = SONGS[songIdx];
  if (currentNote >= song.notes.length) return;
  const id = vexToId(song.notes[currentNote].k);
  const el = document.querySelector(`[data-note="${id}"]`);
  if (!el) return;
  el.classList.add('hl');
  const wrap = document.querySelector('.keyboard-wrap');
  const wr = wrap.getBoundingClientRect(), er = el.getBoundingClientRect();
  if (er.left < wr.left + 20 || er.right > wr.right - 20) {
    el.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  }
}

// ════════════════════════════════════════
// GAME LOGIC
// ════════════════════════════════════════
function handlePress(noteId) {
  ensureAudio();
  playNote(noteId);
  // 自動演奏中: 音と鍵盤の光は出るが、進行には影響しない
  if (isAutoPlaying) { flashKey(noteId, 'ok', 300); return; }

  const song = SONGS[songIdx];
  if (currentNote >= song.notes.length) return;
  const expected = vexToId(song.notes[currentNote].k);

  if (noteId === expected) {
    flashKey(noteId, 'ok', 400);
    document.getElementById('nextNote').style.color = '#4ecdc4';
    currentNote++;
    updateStatus();
    renderScore();
    highlightCurrentKey();
    updateCombo(true);
    if (currentNote >= song.notes.length) setTimeout(showComplete, 500);
  } else {
    flashKey(noteId, 'ng', 350);
    flashKey(expected, 'hl', 700);
    updateCombo(false);
    // brief shake on next-note display
    const nn = document.getElementById('nextNote');
    nn.style.color = '#e94560';
    setTimeout(() => { nn.style.color = '#4ecdc4'; }, 400);
  }
}

function updateStatus() {
  const song = SONGS[songIdx];
  total = song.notes.length;
  const done = currentNote;
  document.getElementById('nextNote').textContent =
    done >= total ? 'DONE' : toSolfege(vexToId(song.notes[done].k));
  document.getElementById('scoreDisp').textContent = `${done} / ${total}`;
  document.getElementById('progFill').style.width = `${(done / total) * 100}%`;
}

function showComplete() {
  stopAutoPlay();
  const badge = document.getElementById('comboBadge');
  const comboLine = combo >= 3 ? ` コンボ最大 ${combo}🔥` : '';
  document.getElementById('overlayMsg').textContent = `全${total}音 クリア！${comboLine}`;
  document.getElementById('overlay').classList.add('show');
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
function saveSong(idx) {
  try { localStorage.setItem('piano_song', idx); } catch(e) {}
}
function loadedSong() {
  try { return Math.min(Math.max(0, parseInt(localStorage.getItem('piano_song')) || 0), SONGS.length - 1); }
  catch(e) { return 0; }
}

function loadSong(idx) {
  stopAutoPlay();
  songIdx = idx; currentNote = 0; combo = 0;
  saveSong(idx);
  document.getElementById('comboBadge').textContent = '';
  document.getElementById('comboBadge').classList.remove('show','anim');
  document.getElementById('nextNote').style.color = '#4ecdc4';
  document.getElementById('overlay').classList.remove('show');
  updateStatus(); renderScore(); highlightCurrentKey();
}

function init() {
  // Song select
  const sel = document.getElementById('songSel');
  SONGS.forEach((s,i) => { const o = document.createElement('option'); o.value=i; o.textContent=s.label; sel.appendChild(o); });
  sel.addEventListener('change', e => loadSong(+e.target.value));

  // BPM
  const slider = document.getElementById('bpmSlider');
  const bpmVal = document.getElementById('bpmVal');
  slider.addEventListener('input', () => { bpm = +slider.value; bpmVal.textContent = bpm; });

  // Buttons
  document.getElementById('resetBtn').addEventListener('click', () => loadSong(songIdx));
  document.getElementById('playBtn').addEventListener('click', toggleAutoPlay);
  document.getElementById('againBtn').addEventListener('click', () => loadSong(songIdx));

  buildKeyboard();
  const startIdx = loadedSong();
  sel.value = startIdx;
  loadSong(startIdx);
  window.addEventListener('resize', () => renderScore());
}

// Prevent zoom
document.addEventListener('gesturestart',  e => e.preventDefault(), { passive:false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive:false });
document.addEventListener('gestureend',    e => e.preventDefault(), { passive:false });
document.addEventListener('dblclick',      e => e.preventDefault());

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else if (typeof Vex !== 'undefined') init();
else window.addEventListener('load', init);
</script>
